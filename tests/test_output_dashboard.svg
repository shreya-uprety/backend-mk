<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2600" viewBox="0 0 2000 2600" style="font-family: 'Inter', system-ui, sans-serif;">
  <rect width="2000" height="2600" fill="#f8fafc"/>

  <!-- Zone: PATIENT_HEADER -->
  <g id="zone-patient_header" transform="translate(100, 100)">
    <rect width="1800" height="180" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="70" font-size="36" font-weight="700" fill="#0f172a">
      Decompensated Alcohol-Associated Cirrhosis (Child-Pugh C, F4)
    </text>
    <text x="40" y="125" font-size="20" font-weight="400" fill="#475569">
      <tspan font-weight="600">Sarah Jenkins, 42yo Female</tspan> | Chronic heavy alcohol use | Platelets 9.8K | Bilirubin 8.5 mg/dL | Hgb 65 g/L
    </text>
  </g>

  <!-- Zone: DECOMPENSATION_STATUS_PANEL -->
  <g id="zone-decompensation_status_panel" transform="translate(100, 360)">
    <rect width="850" height="500" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Critical Decompensation Status</text>
    <text x="40" y="88" font-size="15" fill="#475569">Patient presents with multiple life-threatening complications of end-stage liver disease.</text>
    
    <g transform="translate(40, 120)">
      <!-- Grid of 2x2 Alert Cards -->
      <!-- Card 1: Tense Ascites -->
      <g transform="translate(0, 0)">
        <rect width="365" height="160" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
        <circle cx="40" cy="45" r="16" fill="#ef4444"/>
        <path d="M32 45 C32 50, 48 50, 48 45 C48 40, 32 40, 32 45 Z M36 45 C36 48, 44 48, 44 45 C44 42, 36 42, 36 45 Z" fill="white" transform="translate(0, 2)"/>
        <text x="70" y="52" font-size="18" font-weight="600" fill="#991b1b">Tense Ascites</text>
        <text x="40" y="90" font-size="14" fill="#7f1d1d">
          <tspan x="40" dy="0">Massive fluid accumulation causing</tspan>
          <tspan x="40" dy="1.5em">respiratory compromise. Urgent</tspan>
          <tspan x="40" dy="1.5em">paracentesis required.</tspan>
        </text>
      </g>
      <!-- Card 2: Hepatic Encephalopathy -->
      <g transform="translate(405, 0)">
        <rect width="365" height="160" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
        <circle cx="40" cy="45" r="16" fill="#ef4444"/>
        <path d="M 35,38 a 5,5 0 1,1 10,0 a 5,5 0 1,1 -10,0 M 40,35 v 15 M 35,50 h 10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
        <text x="70" y="52" font-size="18" font-weight="600" fill="#991b1b">Hepatic Encephalopathy</text>
        <text x="40" y="90" font-size="14" fill="#7f1d1d">
          <tspan x="40" dy="0">Grade 2: Patient is confused, foggy,</tspan>
          <tspan x="40" dy="1.5em">and sleepy. Actively managed with</tspan>
          <tspan x="40" dy="1.5em">Lactulose &amp; Rifaximin.</tspan>
        </text>
      </g>
      <!-- Card 3: Acute Kidney Injury -->
      <g transform="translate(0, 200)">
        <rect width="365" height="160" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
        <circle cx="40" cy="45" r="16" fill="#ef4444"/>
        <path d="M 35,40 l 10,10 M 35,50 l 10,-10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <text x="70" y="52" font-size="18" font-weight="600" fill="#991b1b">Acute Kidney Injury</text>
        <text x="40" y="90" font-size="14" fill="#7f1d1d">
          <tspan x="40" dy="0">Creatinine 1.4 mg/dL. Hepatorenal</tspan>
          <tspan x="40" dy="1.5em">syndrome vs. dehydration. Diuretics</tspan>
          <tspan x="40" dy="1.5em">held pending evaluation.</tspan>
        </text>
      </g>
      <!-- Card 4: Esophageal Varices -->
      <g transform="translate(405, 200)">
        <rect width="365" height="160" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
        <circle cx="40" cy="45" r="16" fill="#ef4444"/>
        <path d="M 40,35 v 10 l 5,5 l -10,0 l 5,-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="70" y="52" font-size="18" font-weight="600" fill="#991b1b">Large Esophageal Varices</text>
        <text x="40" y="90" font-size="14" fill="#7f1d1d">
          <tspan x="40" dy="0">High-risk varices confirmed on CT.</tspan>
          <tspan x="40" dy="1.5em">Significant risk of life-threatening</tspan>
          <tspan x="40" dy="1.5em">hemorrhage.</tspan>
        </text>
      </g>
    </g>
  </g>

  <!-- Zone: LIVER_FUNCTION_GAUGES -->
  <g id="zone-liver_function_gauges" transform="translate(1030, 360)">
    <rect width="870" height="500" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Severe Liver Dysfunction</text>
    <text x="40" y="88" font-size="15" fill="#475569">Key markers indicating synthetic failure and high short-term mortality risk.</text>
    
    <g transform="translate(40, 120)">
      <!-- Grid of 2x2 Stat Cards -->
      <!-- Card 1: Bilirubin -->
      <g transform="translate(0, 0)">
        <rect width="375" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
        <text x="30" y="45" font-size="16" font-weight="500" fill="#475569">Total Bilirubin</text>
        <text x="30" y="115" font-size="64" font-weight="700" fill="#dc2626">8.5</text>
        <text x="160" y="115" font-size="20" font-weight="500" fill="#475569">mg/dL</text>
        <text x="250" y="45" font-size="14" font-weight="600" fill="#dc2626">↑ CRITICALLY HIGH</text>
        <rect x="30" y="130" width="315" height="8" fill="#e2e8f0" rx="4"/>
        <rect x="30" y="130" width="315" height="8" fill="#dc2626" rx="4"/>
      </g>
      <!-- Card 2: INR -->
      <g transform="translate(415, 0)">
        <rect width="375" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
        <text x="30" y="45" font-size="16" font-weight="500" fill="#475569">INR</text>
        <text x="30" y="115" font-size="64" font-weight="700" fill="#dc2626">2.1</text>
        <text x="250" y="45" font-size="14" font-weight="600" fill="#dc2626">↑ SEVERE COAGULOPATHY</text>
        <rect x="30" y="130" width="315" height="8" fill="#e2e8f0" rx="4"/>
        <rect x="30" y="130" width="250" height="8" fill="#dc2626" rx="4"/>
      </g>
      <!-- Card 3: Albumin -->
      <g transform="translate(0, 200)">
        <rect width="375" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
        <text x="30" y="45" font-size="16" font-weight="500" fill="#475569">Albumin</text>
        <text x="30" y="115" font-size="64" font-weight="700" fill="#f59e0b">2.4</text>
        <text x="125" y="115" font-size="20" font-weight="500" fill="#475569">g/dL</text>
        <text x="250" y="45" font-size="14" font-weight="600" fill="#f59e0b">↓ CRITICALLY LOW</text>
        <rect x="30" y="130" width="315" height="8" fill="#e2e8f0" rx="4"/>
        <rect x="30" y="130" width="100" height="8" fill="#f59e0b" rx="4"/>
      </g>
      <!-- Card 4: Platelets -->
      <g transform="translate(415, 200)">
        <rect width="375" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
        <text x="30" y="45" font-size="16" font-weight="500" fill="#475569">Platelets</text>
        <text x="30" y="115" font-size="64" font-weight="700" fill="#f59e0b">9.8</text>
        <text x="145" y="115" font-size="20" font-weight="500" fill="#475569">K/μL</text>
        <text x="250" y="45" font-size="14" font-weight="600" fill="#f59e0b">↓ CRITICALLY LOW</text>
        <rect x="30" y="130" width="315" height="8" fill="#e2e8f0" rx="4"/>
        <rect x="30" y="130" width="50" height="8" fill="#f59e0b" rx="4"/>
      </g>
    </g>
  </g>

  <!-- Zone: VITAL_SIGNS_HEMODYNAMICS -->
  <g id="zone-vital_signs_hemodynamics" transform="translate(100, 940)">
    <rect width="850" height="300" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Hemodynamic Status</text>
    <text x="40" y="88" font-size="15" fill="#475569">Hypotension and tachycardia suggest circulatory dysfunction, possible sepsis.</text>
    <g transform="translate(40, 130)">
      <!-- Card 1: BP -->
      <rect x="0" y="0" width="230" height="120" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
      <text x="115" y="35" text-anchor="middle" font-size="15" fill="#991b1b">Blood Pressure</text>
      <text x="115" y="80" text-anchor="middle" font-size="36" font-weight="700" fill="#991b1b">98/55</text>
      <text x="115" y="105" text-anchor="middle" font-size="14" fill="#991b1b">Hypotensive</text>
      <!-- Card 2: HR -->
      <rect x="270" y="0" width="230" height="120" fill="#fef2f2" rx="12" stroke="#fca5a5"/>
      <text x="385" y="35" text-anchor="middle" font-size="15" fill="#991b1b">Heart Rate</text>
      <text x="385" y="80" text-anchor="middle" font-size="36" font-weight="700" fill="#991b1b">108</text>
      <text x="385" y="105" text-anchor="middle" font-size="14" fill="#991b1b">Tachycardia</text>
      <!-- Card 3: Temp -->
      <rect x="540" y="0" width="230" height="120" fill="#fffbeb" rx="12" stroke="#fcd34d"/>
      <text x="655" y="35" text-anchor="middle" font-size="15" fill="#b45309">Temperature</text>
      <text x="655" y="80" text-anchor="middle" font-size="36" font-weight="700" fill="#b45309">37.9°C</text>
      <text x="655" y="105" text-anchor="middle" font-size="14" fill="#b45309">Low-grade fever</text>
    </g>
  </g>

  <!-- Zone: MISSING_CRITICAL_DATA -->
  <g id="zone-missing_critical_data" transform="translate(1030, 940)">
    <rect width="870" height="300" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Critical Data Gaps</text>
    <text x="40" y="88" font-size="15" fill="#475569">Information required for accurate prognosis and to rule out co-etiologies.</text>
    <g transform="translate(40, 130)">
      <rect width="790" height="140" fill="#fffbeb" rx="12" stroke="#fcd34d"/>
      <circle cx="35" cy="35" r="10" fill="#f59e0b"/>
      <text x="29" y="40" fill="white" font-size="14" font-weight="bold">!</text>
      <text x="60" y="40" font-size="16" font-weight="600" fill="#b45309">Missing Serum Sodium</text>
      <text x="60" y="65" font-size="14" fill="#92400e">Prevents calculation of MELD-Na score, a key prognostic tool.</text>
      
      <line x1="30" y1="85" x2="760" y2="85" stroke="#fcd34d" stroke-width="1"/>
      
      <text x="60" y="115" font-size="14" fill="#92400e">
        <tspan font-weight="600">• Missing Viral Hepatitis Panel:</tspan> Co-existing HBV/HCV cannot be ruled out.
      </text>
      <text x="60" y="140" font-size="14" fill="#92400e">
        <tspan font-weight="600">• Missing Autoimmune Markers:</tspan> Co-existing AIH cannot be ruled out.
      </text>
    </g>
  </g>

  <!-- Zone: OTHER_CLINICAL_FINDINGS -->
  <g id="zone-other_clinical_findings" transform="translate(100, 1320)">
    <rect width="1800" height="350" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Supporting Clinical &amp; Laboratory Findings</text>
    <text x="40" y="88" font-size="15" fill="#475569">Additional data confirming alcoholic hepatitis, portal hypertension, and severe anemia.</text>
    <g transform="translate(40, 130)">
      <!-- Card 1: AST/ALT Ratio -->
      <rect x="0" y="0" width="400" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
      <text x="30" y="40" font-size="16" font-weight="500" fill="#475569">AST/ALT Ratio</text>
      <text x="30" y="95" font-size="52" font-weight="700" fill="#dc2626">2.47</text>
      <text x="30" y="130" font-size="14" fill="#7f1d1d" font-weight="500">Highly specific for alcoholic hepatitis</text>
      <!-- Card 2: Hemoglobin -->
      <rect x="440" y="0" width="400" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
      <text x="470" y="40" font-size="16" font-weight="500" fill="#475569">Hemoglobin</text>
      <text x="470" y="95" font-size="52" font-weight="700" fill="#dc2626">65</text>
      <text x="560" y="95" font-size="18" fill="#475569">g/L</text>
      <text x="470" y="130" font-size="14" fill="#7f1d1d" font-weight="500">Severe Anemia - investigate for GI bleed</text>
      <!-- Card 3: Splenomegaly -->
      <rect x="880" y="0" width="400" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
      <text x="910" y="40" font-size="16" font-weight="500" fill="#475569">Splenomegaly (Ultrasound)</text>
      <text x="910" y="95" font-size="52" font-weight="700" fill="#475569">17.5</text>
      <text x="1030" y="95" font-size="18" fill="#475569">cm</text>
      <text x="910" y="130" font-size="14" fill="#475569" font-weight="500">Sign of severe portal hypertension</text>
      <!-- Card 4: FIB-4 -->
      <rect x="1320" y="0" width="400" height="160" fill="#f8fafc" rx="12" stroke="#e2e8f0"/>
      <text x="1350" y="40" font-size="16" font-weight="500" fill="#475569">FIB-4 Score</text>
      <text x="1350" y="95" font-size="52" font-weight="700" fill="#dc2626">97.62</text>
      <text x="1350" y="130" font-size="14" fill="#7f1d1d" font-weight="500">Confirms high risk of advanced fibrosis (F4)</text>
    </g>
  </g>

  <!-- Zone: ACTIVE_MEDICATIONS -->
  <g id="zone-active_medications" transform="translate(100, 1750)">
    <rect width="1800" height="250" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Active Inpatient Medications</text>
    <text x="40" y="88" font-size="15" fill="#475569">Current therapies for managing acute complications.</text>
    <g transform="translate(40, 130)">
      <g>
        <rect x="0" y="0" width="400" height="70" fill="#f1f5f9" rx="8"/>
        <text x="20" y="30" font-size="16" font-weight="600" fill="#0f172a">Thiamine IV</text>
        <text x="20" y="55" font-size="14" fill="#475569">For Wernicke-Korsakoff prophylaxis</text>
      </g>
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="400" height="70" fill="#f1f5f9" rx="8"/>
        <text x="20" y="30" font-size="16" font-weight="600" fill="#0f172a">Lactulose QDS</text>
        <text x="20" y="55" font-size="14" fill="#475569">For Hepatic Encephalopathy</text>
      </g>
      <g transform="translate(880, 0)">
        <rect x="0" y="0" width="400" height="70" fill="#f1f5f9" rx="8"/>
        <text x="20" y="30" font-size="16" font-weight="600" fill="#0f172a">Rifaximin BID</text>
        <text x="20" y="55" font-size="14" fill="#475569">For Hepatic Encephalopathy</text>
      </g>
      <g transform="translate(1320, 0)">
        <rect x="0" y="0" width="400" height="70" fill="#fffbeb" rx="8" stroke="#fcd34d"/>
        <text x="20" y="30" font-size="16" font-weight="600" fill="#b45309">Spironolactone OD</text>
        <text x="20" y="55" font-size="14" fill="#92400e">ON HOLD - Pending AKI resolution</text>
      </g>
    </g>
  </g>

  <!-- Zone: ACTION_CHECKLIST -->
  <g id="zone-action_checklist" transform="translate(100, 2080)">
    <rect width="1800" height="400" fill="#ffffff" rx="16" stroke="#e2e8f0" stroke-width="2"/>
    <text x="40" y="60" font-size="24" font-weight="700" fill="#0f172a">Immediate Action Plan</text>
    <text x="40" y="88" font-size="15" fill="#475569">Prioritized steps for patient stabilization and management.</text>
    <g transform="translate(40, 120)">
      <!-- Left Column -->
      <g>
        <text y="30" font-size="15" fill="#334155"><tspan font-weight="bold">1.</tspan> Expedite diagnostic paracentesis; start empiric antibiotics for SBP.</text>
        <text y="60" font-size="15" fill="#334155"><tspan font-weight="bold">2.</tspan> Obtain serum sodium STAT to calculate MELD-Na score.</text>
        <text y="90" font-size="15" fill="#334155"><tspan font-weight="bold">3.</tspan> Transfuse PRBCs for severe anemia (Hgb 65); investigate bleed source.</text>
        <text y="120" font-size="15" fill="#334155"><tspan font-weight="bold">4.</tspan> Aggressively manage HE with Lactulose/Rifaximin (target 2-3 BMs/day).</text>
        <text y="150" font-size="15" fill="#334155"><tspan font-weight="bold">5.</tspan> Manage AKI; hold diuretics, consider albumin infusions.</text>
      </g>
      <!-- Right Column -->
      <g transform="translate(880, 0)">
        <text y="30" font-size="15" fill="#334155"><tspan font-weight="bold">6.</tspan> Order comprehensive viral hepatitis and autoimmune panels.</text>
        <text y="60" font-size="15" fill="#334155"><tspan font-weight="bold">7.</tspan> Consult GI for urgent upper endoscopy to assess and band varices.</text>
        <text y="90" font-size="15" fill="#334155"><tspan font-weight="bold">8.</tspan> Initiate aggressive nutritional support and dietary counseling.</text>
        <text y="120" font-size="15" fill="#334155"><tspan font-weight="bold">9.</tspan> Refer to formal alcohol cessation program and support services.</text>
        <text y="150" font-size="15" fill="#334155"><tspan font-weight="bold">10.</tspan> Consider liver transplant evaluation once stable and abstinent.</text>
      </g>
    </g>
  </g>
</svg>