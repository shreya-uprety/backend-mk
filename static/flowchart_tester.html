<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Flowchart Tester</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; padding: 16px; }
        h1 { font-size: 1.4rem; color: #1a1a2e; }
        h2 { font-size: 1rem; margin-bottom: 8px; color: #16213e; }
        .subtitle { color: #888; font-size: 0.82rem; margin-bottom: 16px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 14px; }
        .panel { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; }
        .full-width { grid-column: 1 / -1; }
        input, select { padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.85rem; width: 100%; }
        button { padding: 8px 14px; border: none; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-primary { background: #4361ee; color: #fff; }
        .btn-outline { background: #fff; color: #4361ee; border: 2px solid #4361ee; }
        .btn-danger { background: #e63946; color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .badge { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; }
        .badge-in-progress { background: #dbeafe; color: #1e40af; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .badge-escalated { background: #fee2e2; color: #991b1b; }
        .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.72rem; font-weight: 600; margin: 2px; background: #f3f4f6; }

        .pathway-bar { padding: 6px 12px; border-radius: 5px; font-weight: 600; font-size: 0.82rem; margin-bottom: 10px; }
        .pathway-standard { background: #dbeafe; color: #1e40af; border-left: 4px solid #3b82f6; }
        .pathway-urgent { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }

        .step { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 5px; margin-bottom: 3px; font-size: 0.82rem; }
        .step.active { background: #eef2ff; border: 2px solid #4361ee; }
        .step.done { background: #f0fdf4; }
        .step.future { color: #aaa; }
        .step-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; flex-shrink: 0; }
        .step-dot.done { background: #2ec4b6; color: #fff; }
        .step-dot.active { background: #4361ee; color: #fff; }
        .step-dot.future { background: #e5e7eb; color: #aaa; }
        .step-name { font-weight: 600; }
        .step-meta { font-size: 0.68rem; color: #888; }
        .pathway-decision-box { font-size: 0.85rem; color: #1e40af; line-height: 1.5; padding: 10px 14px; background: #eff6ff; border-radius: 6px; border-left: 3px solid #3b82f6; margin-top: 4px; }
        .step-view { font-size: 0.68rem; color: #4361ee; cursor: pointer; margin-left: auto; }
        .step-view:hover { text-decoration: underline; }

        .decision-box { background: #fffbeb; border: 2px solid #fbbf24; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .decision-box h3 { font-size: 0.85rem; color: #92400e; margin-bottom: 6px; }
        .decision-btn { padding: 6px 16px; border: 2px solid #ddd; border-radius: 5px; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.82rem; margin-right: 6px; }
        .decision-btn:hover { border-color: #4361ee; background: #eef2ff; }

        .confirm-section { margin-top: 14px; padding: 14px; background: #fefce8; border: 2px solid #facc15; border-radius: 8px; }
        .confirm-section h3 { font-size: 0.9rem; color: #854d0e; margin-bottom: 8px; }
        .confirm-section textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.82rem; resize: vertical; min-height: 50px; margin-bottom: 8px; font-family: inherit; }
        .confirm-actions { display: flex; gap: 8px; }
        .btn-confirm { background: #059669; color: #fff; padding: 8px 20px; border: none; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-confirm:hover { background: #047857; }
        .btn-override { background: #fff; color: #dc2626; padding: 8px 16px; border: 2px solid #dc2626; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-override:hover { background: #fef2f2; }
        .override-select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.82rem; margin-right: 8px; }
        .step.awaiting { background: #fefce8; border: 2px solid #facc15; }
        .step-dot.awaiting { background: #facc15; color: #854d0e; }
        .badge-awaiting-confirmation { background: #fef3c7; color: #92400e; }
        .confirmed-tag { font-size: 0.65rem; color: #059669; font-weight: 600; }
        .overridden-tag { font-size: 0.65rem; color: #dc2626; font-weight: 600; }

        .scenario-item { padding: 6px 8px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; margin-bottom: 3px; }
        .scenario-item:hover { background: #eef2ff; }
        .scenario-item.selected { background: #dbeafe; border: 1px solid #4361ee; }
        .scenario-desc { font-size: 0.7rem; color: #888; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 650px; width: 92%; max-height: 85vh; overflow-y: auto; }
        .modal-close { float: right; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888; }
        .modal h2 { margin-bottom: 10px; font-size: 1.1rem; }
        .modal-verdict { font-size: 1.3rem; font-weight: 700; margin: 8px 0; }
        .modal-verdict.red { color: #e63946; }
        .modal-verdict.green { color: #059669; }
        .modal-verdict.blue { color: #2563eb; }
        .modal-section { margin-top: 14px; }
        .modal-section h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .modal-text { font-size: 0.88rem; line-height: 1.5; color: #444; }
        .modal-evidence { background: #f8fafc; border-left: 3px solid #4361ee; padding: 8px 12px; border-radius: 0 5px 5px 0; margin-top: 6px; font-size: 0.82rem; color: #555; }
        .modal-agent { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; margin-top: 6px; }
        .modal-agent-name { font-weight: 600; font-size: 0.82rem; }
        .modal-agent-reasoning { font-size: 0.8rem; color: #555; margin-top: 3px; line-height: 1.4; }
        .modal-list { list-style: disc; padding-left: 18px; font-size: 0.85rem; color: #444; }
        .modal-list li { margin-bottom: 4px; }

        .log { background: #1a1a2e; color: #a3e635; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 0.75rem; max-height: 180px; overflow-y: auto; white-space: pre-wrap; }
        .log .info { color: #60a5fa; }
        .log .success { color: #34d399; }
        .log .error { color: #f87171; }
        .log .dim { color: #6b7280; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left: Scenarios + Controls -->
        <div>
            <div class="panel">
                <h2>Test Scenarios</h2>
                <div id="scenarioList"></div>
            </div>
            <div class="panel">
                <h2>Patient</h2>
                <div class="row" style="margin-bottom: 8px;">
                    <input type="text" id="patientId" placeholder="Patient ID" value="sc_01_nafld" style="flex:1;">
                </div>
                <div class="row">
                    <button class="btn-primary btn-sm" onclick="createFromScenario()">Create from Scenario</button>
                    <button class="btn-outline btn-sm" onclick="loadPatient()">Load Existing</button>
                </div>
                <div class="row" style="margin-top: 8px;">
                    <button class="btn-danger btn-sm" onclick="resetPatient()">Reset</button>
                </div>
            </div>
            <div class="panel">
                <h2>Log</h2>
                <div class="log" id="log"><span class="dim">Ready</span></div>
            </div>
        </div>

        <!-- Right: Status + Steps -->
        <div>
            <div class="panel" id="statusPanel" style="display:none;">
                <div id="pathwayBar" class="pathway-bar pathway-standard">STANDARD TRIAGE</div>
                <div class="row" style="margin-bottom:10px; justify-content:space-between;">
                    <div>
                        <div style="font-size:1.1rem; font-weight:700;" id="currentStepLabel"></div>
                        <span class="badge" id="statusBadge"></span>
                    </div>
                    <button class="btn-primary" onclick="advance()" id="advanceBtn">Advance</button>
                </div>
                <div id="decisionArea" style="display:none;"></div>
                <h2>Steps</h2>
                <div id="stepList"></div>
                <div id="metaArea" style="display:none; margin-top:10px;">
                    <h2>Findings</h2>
                    <div id="metaGrid" class="row" style="gap:4px; flex-wrap:wrap;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal" id="modalContent"></div>
    </div>

    <script>
        const BASE = `${window.location.origin}/api/v1/patient-status`;
        let patientId = null;
        let status = null;
        let scenarios = [];
        let selectedScenario = null;

        const LABELS = {
            GP_REFERRAL_RECEIVED: "GP Referral & LFT Received",
            INTAKE_DIGITIZATION: "Intake & Digitize",
            DASHBOARD_CONFIRMATION: "Confirm on Dashboard",
            EXTRACT_RISK_FACTORS: "Extract Risk Factors",
            RED_FLAG_ASSESSMENT: "Red Flag Symptoms?",
            URGENT_CONSULTANT_PATHWAY: "Urgent Consultant Pathway",
            PRESENT_TRIAGE_OPTIONS: "Present Triage Options",
            GENERATE_GP_LETTER: "Generate GP Letter",
            ANALYZE_LFT_PATTERN: "Analyze LFT Pattern",
            LFT_PATTERN_CLASSIFICATION: "LFT Pattern?",
            CHOLESTATIC_PATTERN: "Cholestatic Pattern",
            HEPATITIC_PATTERN: "Hepatitic Pattern",
            CHOLESTATIC_INVESTIGATIONS: "Hepatic Imaging CT/MRI",
            HEPATITIC_INVESTIGATIONS: "Full Liver Screen + Imaging",
            DIAGNOSTIC_DILEMMA_ASSESSMENT: "Diagnostic Dilemma?",
            RECOMMEND_MRI_BIOPSY_ESCALATE: "MRI/Liver Biopsy",
            CONSULTANT_MDT_REVIEW: "Consultant MDT Review",
            CONSULTANT_REVIEW_SIGNOFF: "Consultant Signs Off",
            CONDUCT_CONSULTATION: "Confirm Diagnosis",
            CONFIRM_DIAGNOSIS_EDUCATION: "Diagnosis & Education",
            PATIENT_EDUCATION: "Patient Education via App",
            ONGOING_MONITORING_ASSESSMENT: "Monitoring Required?",
            AI_SURVEILLANCE_LOOP: "AI Surveillance Loop",
            FINAL_CONSULTANT_SIGNOFF: "Consultant Reviews & Signs Off",
            DISCHARGE_TO_GP: "Discharge to GP",
        };

        const RESULT_MAP = {
            EXTRACT_RISK_FACTORS: "risk_factors",
            RED_FLAG_ASSESSMENT: "red_flag",
            ANALYZE_LFT_PATTERN: "pattern",
            CHOLESTATIC_INVESTIGATIONS: "investigation",
            HEPATITIC_INVESTIGATIONS: "investigation",
            DIAGNOSTIC_DILEMMA_ASSESSMENT: "dilemma",
            RECOMMEND_MRI_BIOPSY_ESCALATE: "complex_case",
            CONSULTANT_REVIEW_SIGNOFF: "consultant_summary",
            CONDUCT_CONSULTATION: "diagnosis",
            PATIENT_EDUCATION: "education",
            ONGOING_MONITORING_ASSESSMENT: "monitoring",
            AI_SURVEILLANCE_LOOP: "surveillance",
            FINAL_CONSULTANT_SIGNOFF: "final_signoff",
        };

        function log(msg, cls = '') {
            const el = document.getElementById('log');
            const t = new Date().toLocaleTimeString();
            el.innerHTML += `\n<span class="dim">[${t}]</span> <span class="${cls}">${msg}</span>`;
            el.scrollTop = el.scrollHeight;
        }

        async function api(method, path, body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(`${BASE}${path}`, opts);
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Failed');
            return data;
        }

        // Load scenarios from local files
        async function loadScenarios() {
            const names = [
                'sc_01_clear_hepatitic_nafld.json',
                'sc_02_clear_cholestatic_pbc.json',
                'sc_03_red_flag_jaundice.json',
                'sc_04_diagnostic_dilemma_mixed.json',
                'sc_05_hepatitic_alcohol.json',
                'sc_06_mild_transient_discharge.json',
                'sc_07_real_patient_p0001.json',
                'sc_08_real_patient_mk0002.json',
                'sc_09_real_patient_mk0003.json',
            ];
            const container = document.getElementById('scenarioList');
            container.innerHTML = '';

            for (const name of names) {
                try {
                    const res = await fetch(`/scenarios/${name}`);
                    if (!res.ok) continue;
                    const sc = await res.json();
                    scenarios.push({ name, ...sc });
                    const div = document.createElement('div');
                    div.className = 'scenario-item';
                    div.innerHTML = `<strong>${sc.scenario_id}</strong><div class="scenario-desc">${sc._description?.substring(0, 80) || ''}</div>`;
                    div.onclick = () => selectScenario(sc, div);
                    container.appendChild(div);
                } catch (e) {}
            }

            if (scenarios.length === 0) {
                container.innerHTML = '<div style="color:#888; font-size:0.8rem;">No scenarios found. Place JSON files in backend/scenarios/</div>';
            }
        }

        function selectScenario(sc, el) {
            document.querySelectorAll('.scenario-item').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedScenario = sc;
            document.getElementById('patientId').value = sc.scenario_id;
        }

        async function createFromScenario() {
            patientId = document.getElementById('patientId').value.trim();
            if (!patientId) return;
            document.getElementById('log').innerHTML = '';

            const body = { patient_id: patientId };
            if (selectedScenario) {
                body.scenario = selectedScenario;
                log(`Creating ${patientId} from scenario (pre-computing risk factors)...`, 'info');
            }

            try {
                status = await api('POST', '/create', body);
                log(`Created ${patientId}`, 'success');
                render();
            } catch (e) { log(e.message, 'error'); }
        }

        async function loadPatient() {
            patientId = document.getElementById('patientId').value.trim();
            if (!patientId) return;
            document.getElementById('log').innerHTML = '';
            try {
                status = await api('GET', `/${patientId}`);
                log(`Loaded at ${LABELS[status.current_step]}`, 'success');
                render();
            } catch (e) { log(e.message, 'error'); }
        }

        async function resetPatient() {
            if (!patientId || !confirm(`Reset ${patientId}?`)) return;
            try { await api('DELETE', `/${patientId}`); } catch (e) {}
            log(`Reset ${patientId}`, 'info');
            status = null;
            document.getElementById('statusPanel').style.display = 'none';
        }

        async function advance(decision = null) {
            if (!patientId) return;
            const btn = document.getElementById('advanceBtn');
            btn.disabled = true; btn.textContent = 'Running...';

            try {
                const start = Date.now();
                status = await api('POST', `/${patientId}/advance`, { decision });
                const sec = ((Date.now() - start) / 1000).toFixed(1);
                log(`${LABELS[status.current_step]} (${sec}s)`, 'success');

                if (status.handler_results) {
                    for (const hr of status.handler_results) {
                        if (hr.error) log(`Error: ${hr.error}`, 'error');
                        if (hr.auto_decision) log(`Auto-decided: ${hr.auto_decision}`, 'info');
                        if (hr.pathway_decision) log(`  ${hr.pathway_decision.substring(0, 120)}...`, 'info');
                    }
                }

                render();

                // Show popups for all handler results in the chain
                const results = status.handler_results || (status.handler_result ? [status.handler_result] : []);
                for (const hr of results) {
                    const resultType = RESULT_MAP[hr.step];
                    if (resultType) {
                        // Set confirmation context if needed
                        if (hr.requires_confirmation) {
                            pendingConfirmation = {
                                step: hr.step,
                                auto_decision: hr.auto_decision,
                                override_options: getOverrideOptions(hr.step),
                            };
                            log(`  Awaiting confirmation: ${hr.step}`, 'info');
                        }
                        await showPopup(resultType, hr.pathway_decision);
                    }
                }
            } catch (e) { log(e.message, 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Advance'; }
        }

        async function showPopup(resultType, pathwayDecision = null) {
            try {
                const res = await fetch(`${BASE}/${patientId}/step-result/${resultType}`);
                if (!res.ok) return;
                const data = await res.json();

                // If no pathway decision passed, try to load from GCS
                if (!pathwayDecision && patientId) {
                    const stepForType = Object.entries(RESULT_MAP).find(([k, v]) => v === resultType);
                    if (stepForType) pathwayDecision = pathwayDecisions[stepForType[0]];
                }

                const html = buildPopup(resultType, data, pathwayDecision);
                if (html) {
                    document.getElementById('modalContent').innerHTML = html;
                    document.getElementById('modal').classList.add('show');
                }
            } catch (e) { console.error(e); }
        }

        async function viewResult(step) {
            const type = RESULT_MAP[step];
            const pd = pathwayDecisions[step] || null;
            if (type) await showPopup(type, pd);
        }

        let pendingConfirmation = null; // { step, auto_decision, pathway_decision }

        function buildPopup(type, data, pathwayDecision = null) {
            const close = '<button class="modal-close" onclick="closeModal()">x</button>';
            const pd = pathwayDecision ? `<div class="modal-section"><h3>Pathway Decision</h3><div class="pathway-decision-box">${pathwayDecision}</div></div>` : '';

            // If awaiting confirmation, show confirm/override section instead of Continue
            let cont;
            if (pendingConfirmation) {
                const overrideOpts = pendingConfirmation.override_options || [];
                const overrideHtml = overrideOpts.length > 0
                    ? `<div style="display:flex;align-items:center;gap:6px;">
                        <select class="override-select" id="overrideSelect">
                            ${overrideOpts.map(o => `<option value="${o}">${o.toUpperCase()}</option>`).join('')}
                        </select>
                        <button class="btn-override" onclick="overrideStep()">Override AI Decision</button>
                       </div>`
                    : '';

                cont = `
                    <div class="confirm-section">
                        <h3>Nurse Confirmation Required</h3>
                        <p style="font-size:0.82rem;color:#666;margin-bottom:8px;">
                            Review the AI findings above. You must confirm or override before the patient can proceed.
                        </p>
                        <textarea id="nurseNotes" placeholder="Optional: Add clinical notes or observations..."></textarea>
                        <div class="confirm-actions">
                            <button class="btn-confirm" onclick="confirmStep()">Confirm & Proceed</button>
                            ${overrideHtml}
                        </div>
                    </div>`;
            } else {
                cont = '<button class="btn-primary btn-sm" onclick="closeModal()" style="margin-top:14px;width:100%;">Continue</button>';
            }

            if (type === 'risk_factors') {
                const dm = data.derived_metrics || {};
                const rf = data.risk_factors || {};
                const r = dm.r_factor || {};
                const uln = dm.uln_multiples || {};
                return `${close}<h2>Risk Factor Extraction</h2>
                    <div class="modal-verdict blue">R-Factor: ${r.value || 'N/A'} (${r.zone || ''} zone)</div>
                    <div class="modal-section"><h3>ULN Multiples</h3>
                        <div class="row" style="gap:6px;flex-wrap:wrap;">${Object.entries(uln).map(([k,v]) =>
                            `<span class="tag" style="background:${v>1?'#fef2f2':'#f0fdf4'};color:${v>1?'#dc2626':'#059669'}">${k}: ${v}x</span>`
                        ).join('')}</div></div>
                    <div class="modal-section"><h3>Risk Profile</h3>
                        <div class="modal-text">Alcohol: ${rf.alcohol_risk?.units_weekly || 0} u/wk (${rf.alcohol_risk?.level}) | BMI: ${rf.bmi_category?.value} (${rf.bmi_category?.category}) | Diabetes: ${rf.diabetes_status?.present ? 'Yes' : 'No'}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'red_flag') {
                const isRF = data.final_decision === 'RED_FLAG_PRESENT';
                const s = data.debate_summary || {};
                return `${close}<h2>Red Flag Assessment</h2>
                    <div class="modal-verdict ${isRF?'red':'green'}">${isRF?'RED FLAG PRESENT':'NO RED FLAGS'}</div>
                    <p style="font-size:0.85rem;color:#666;">Confidence: ${(data.confidence_score*100).toFixed(0)}%</p>
                    <div class="modal-section"><h3>Rationale</h3><div class="modal-text">${s.synthesis_rationale||''}</div></div>
                    ${(s.agent_perspectives||[]).map(p => `<div class="modal-agent"><span class="modal-agent-name">${p.agent_persona}</span> <span style="color:${p.verdict==='RED_FLAG_PRESENT'?'#e63946':'#059669'};font-weight:600;">${p.verdict} (${(p.confidence*100).toFixed(0)}%)</span><div class="modal-agent-reasoning">${p.reasoning}</div></div>`).join('')}
                    ${pd}${cont}`;
            }

            if (type === 'pattern') {
                const s = data.debate_summary || {};
                return `${close}<h2>LFT Pattern Analysis</h2>
                    <div class="modal-verdict blue">${data.final_classification||'UNKNOWN'}</div>
                    <p style="font-size:0.85rem;color:#666;">Confidence: ${(data.confidence_score*100).toFixed(0)}% | R-Factor: ${data.r_factor?.value} (${data.r_factor?.zone})</p>
                    <div class="modal-section"><h3>Rationale</h3><div class="modal-text">${s.synthesis_rationale||''}</div></div>
                    ${(s.agent_perspectives||[]).map(p => `<div class="modal-agent"><span class="modal-agent-name">${p.agent_persona}</span> <span style="color:#2563eb;font-weight:600;">${p.classification} (${(p.confidence*100).toFixed(0)}%)</span><div class="modal-agent-reasoning">${p.reasoning}</div></div>`).join('')}
                    ${pd}${cont}`;
            }

            if (type === 'investigation') {
                const invs = data.recommended_investigations || [];
                const diffs = data.differential_diagnoses || [];
                return `${close}<h2>Investigation Recommendations</h2>
                    <div class="modal-verdict blue">${data.overall_urgency?.toUpperCase()||''} PRIORITY</div>
                    <div class="modal-section"><h3>Recommended Investigations</h3>
                        ${invs.map(i => `<div class="modal-evidence"><strong>${i.test_name}</strong> (${i.category}, ${i.urgency})<br>${i.clinical_justification}</div>`).join('')}</div>
                    <div class="modal-section"><h3>Differential Diagnoses</h3><ul class="modal-list">${diffs.map(d => `<li>${d}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Reasoning</h3><div class="modal-text">${data.reasoning||''}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'dilemma') {
                const isDilemma = data.final_decision === 'DIAGNOSTIC_DILEMMA';
                const s = data.debate_summary || {};
                return `${close}<h2>Diagnostic Dilemma Assessment</h2>
                    <div class="modal-verdict ${isDilemma?'red':'green'}">${isDilemma?'DIAGNOSTIC DILEMMA':'STRAIGHTFORWARD CASE'}</div>
                    <p style="font-size:0.85rem;color:#666;">Confidence: ${(data.confidence_score*100).toFixed(0)}%</p>
                    ${data.complexity_factors?.length ? `<div class="modal-section"><h3>Complexity Factors</h3><ul class="modal-list">${data.complexity_factors.map(f=>`<li>${f}</li>`).join('')}</ul></div>` : ''}
                    <div class="modal-section"><h3>Rationale</h3><div class="modal-text">${s.synthesis_rationale||''}</div></div>
                    ${(s.agent_perspectives||[]).map(p => `<div class="modal-agent"><span class="modal-agent-name">${p.agent_persona}</span> <span style="font-weight:600;">${p.verdict} (${(p.confidence*100).toFixed(0)}%)</span><div class="modal-agent-reasoning">${p.reasoning}</div></div>`).join('')}
                    ${pd}${cont}`;
            }

            if (type === 'complex_case') {
                return `${close}<h2>Complex Case — Further Investigation</h2>
                    <div class="modal-verdict blue">${(data.recommended_procedure||'').toUpperCase()}</div>
                    ${data.mri_protocol ? `<div class="modal-section"><h3>MRI Protocol</h3><div class="modal-text">${data.mri_protocol}</div></div>` : ''}
                    ${data.biopsy_indication ? `<div class="modal-section"><h3>Biopsy Indication</h3><div class="modal-text">${data.biopsy_indication}</div></div>` : ''}
                    <div class="modal-section"><h3>Reasoning</h3><div class="modal-text">${data.reasoning||''}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'consultant_summary') {
                const decisions = data.ai_decisions_made || [];
                return `${close}<h2>Consultant Summary</h2>
                    <div class="modal-section"><h3>Clinical Summary</h3><div class="modal-text">${data.clinical_summary||''}</div></div>
                    <div class="modal-section"><h3>Key Findings</h3><ul class="modal-list">${(data.key_findings||[]).map(f=>`<li>${f}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Suggested Differential</h3><ul class="modal-list">${(data.suggested_differential||[]).map(d=>`<li>${d}</li>`).join('')}</ul></div>
                    ${data.questions_for_mdt?.length ? `<div class="modal-section"><h3>Questions for MDT</h3><ul class="modal-list">${data.questions_for_mdt.map(q=>`<li>${q}</li>`).join('')}</ul></div>` : ''}
                    <div class="modal-section"><h3>Recommended Plan</h3><div class="modal-text">${data.recommended_plan||''}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'diagnosis') {
                const diags = data.suggested_diagnoses || [];
                return `${close}<h2>Diagnosis Suggestion</h2>
                    <div class="modal-verdict green">${data.primary_diagnosis||'Unknown'}</div>
                    <div class="modal-section"><h3>Differential</h3>
                        ${diags.map(d => `<div class="modal-evidence"><strong>${d.diagnosis}</strong> (${(d.confidence*100).toFixed(0)}%)<br>${(d.supporting_evidence||[]).join('; ')}</div>`).join('')}</div>
                    ${data.recommended_confirmatory_tests?.length ? `<div class="modal-section"><h3>Confirmatory Tests</h3><ul class="modal-list">${data.recommended_confirmatory_tests.map(t=>`<li>${t}</li>`).join('')}</ul></div>` : ''}
                    <div class="modal-section"><h3>Reasoning</h3><div class="modal-text">${data.reasoning||''}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'education') {
                return `${close}<h2>Patient Education</h2>
                    <div class="modal-section"><h3>About Your Condition</h3><div class="modal-text">${data.condition_explanation||''}</div></div>
                    <div class="modal-section"><h3>Lifestyle Recommendations</h3><ul class="modal-list">${(data.lifestyle_recommendations||[]).map(r=>`<li>${r}</li>`).join('')}</ul></div>
                    ${data.dietary_advice ? `<div class="modal-section"><h3>Dietary Advice</h3><div class="modal-text">${data.dietary_advice}</div></div>` : ''}
                    <div class="modal-section"><h3>Warning Signs</h3><ul class="modal-list">${(data.warning_signs||[]).map(w=>`<li style="color:#e63946;">${w}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Follow-up</h3><div class="modal-text">${data.follow_up_schedule||''}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'monitoring') {
                const req = data.monitoring_required;
                return `${close}<h2>Monitoring Assessment</h2>
                    <div class="modal-verdict ${req?'blue':'green'}">${req?'MONITORING REQUIRED':'NO MONITORING NEEDED'}</div>
                    <div class="modal-section"><h3>Reasoning</h3><div class="modal-text">${data.reasoning||''}</div></div>
                    ${req ? `<div class="modal-section"><h3>Schedule</h3><div class="modal-text">${(data.monitoring_schedule||'').replace(/_/g,' ')} for ${(data.surveillance_duration||'').replace(/_/g,' ')}</div></div>
                    <div class="modal-section"><h3>Tests Per Visit</h3><ul class="modal-list">${(data.monitoring_tests||[]).map(t=>`<li>${t}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Escalation Criteria</h3><ul class="modal-list">${(data.escalation_criteria||[]).map(c=>`<li style="color:#e63946;">${c}</li>`).join('')}</ul></div>` : ''}
                    ${pd}${cont}`;
            }

            if (type === 'surveillance') {
                return `${close}<h2>AI Surveillance Configuration</h2>
                    <div class="modal-verdict blue">${(data.schedule_interval||'').replace(/_/g,' ').toUpperCase()} SURVEILLANCE</div>
                    <div class="modal-section"><h3>Tests Per Visit</h3><ul class="modal-list">${(data.tests_per_visit||[]).map(t=>`<li>${t}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Alert Thresholds</h3><ul class="modal-list">${(data.threshold_alerts||[]).map(a=>`<li style="color:#e63946;">${a}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Discharge Criteria</h3><ul class="modal-list">${(data.auto_discharge_criteria||[]).map(c=>`<li>${c}</li>`).join('')}</ul></div>
                    <div class="modal-section"><h3>Duration</h3><div class="modal-text">${data.total_duration||'N/A'} — next review: ${data.next_review_date||'N/A'}</div></div>
                    ${pd}${cont}`;
            }

            if (type === 'final_signoff') {
                const decisions = data.ai_decisions || [];
                const findings = data.clinical_findings || {};
                const plan = data.surveillance_plan || {};
                const items = data.consultant_attention_items || [];
                return `${close}<h2>Consultant Review & Sign-Off</h2>
                    <div class="modal-section"><h3>Patient Overview</h3><div class="modal-text">${data.patient_overview||''}</div></div>
                    <div class="modal-section"><h3>Pathway Summary</h3><div class="modal-text">${data.pathway_summary||''}</div></div>
                    <div class="modal-section"><h3>AI Decisions Made</h3>
                        ${decisions.map(d => `<div class="modal-evidence"><strong>${d.step}</strong>: ${d.decision} (${((d.confidence||0)*100).toFixed(0)}%)<br>${d.rationale}</div>`).join('')}</div>
                    <div class="modal-section"><h3>Clinical Findings</h3>
                        <ul class="modal-list">
                            ${findings.lft_pattern ? `<li><strong>LFT Pattern:</strong> ${findings.lft_pattern}</li>` : ''}
                            ${findings.risk_factors ? `<li><strong>Risk Factors:</strong> ${findings.risk_factors}</li>` : ''}
                            ${findings.investigations_recommended ? `<li><strong>Investigations:</strong> ${findings.investigations_recommended}</li>` : ''}
                            ${findings.diagnosis ? `<li><strong>Diagnosis:</strong> ${findings.diagnosis}</li>` : ''}
                        </ul></div>
                    ${plan.schedule ? `<div class="modal-section"><h3>Surveillance Plan</h3>
                        <div class="modal-text">${(plan.schedule||'').replace(/_/g,' ')} for ${plan.duration||'N/A'}</div>
                        <ul class="modal-list">${(plan.key_tests||[]).map(t=>`<li>${t}</li>`).join('')}</ul>
                        ${plan.escalation_triggers?.length ? `<div style="margin-top:6px;"><strong>Escalation triggers:</strong><ul class="modal-list">${plan.escalation_triggers.map(e=>`<li style="color:#e63946;">${e}</li>`).join('')}</ul></div>` : ''}
                    </div>` : ''}
                    ${items.length ? `<div class="modal-section"><h3>Items Needing Consultant Attention</h3><ul class="modal-list">${items.map(i=>`<li style="color:#f59e0b; font-weight:600;">${i}</li>`).join('')}</ul></div>` : ''}
                    <div class="modal-section"><h3>Recommendation</h3><div class="modal-text">${data.recommendation||''}</div></div>
                    <div class="modal-section"><h3>Sign-Off Statement</h3><div class="modal-evidence" style="border-left-color:#059669;"><strong>${data.sign_off_statement||''}</strong></div></div>
                    ${pd}${cont}`;
            }

            return null;
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            pendingConfirmation = null;
        }

        async function confirmStep() {
            if (!patientId) return;
            const notes = document.getElementById('nurseNotes')?.value || '';
            try {
                const result = await api('POST', `/${patientId}/confirm`, {
                    action: 'confirm',
                    nurse_notes: notes || null,
                });
                log(`Confirmed: ${result.confirmation?.step}`, 'success');
                if (notes) log(`  Notes: ${notes}`, 'info');
                pendingConfirmation = null;
                closeModal();
                status = result;
                render();
            } catch (e) { log(e.message, 'error'); }
        }

        async function overrideStep() {
            if (!patientId) return;
            const notes = document.getElementById('nurseNotes')?.value || '';
            const overrideDecision = document.getElementById('overrideSelect')?.value;
            if (!overrideDecision) { log('Select an override decision', 'error'); return; }
            try {
                const result = await api('POST', `/${patientId}/confirm`, {
                    action: 'override',
                    nurse_notes: notes || null,
                    override_decision: overrideDecision,
                });
                log(`Overridden: ${result.confirmation?.step} → ${overrideDecision}`, 'error');
                if (notes) log(`  Notes: ${notes}`, 'info');
                pendingConfirmation = null;
                closeModal();
                status = result;
                render();
            } catch (e) { log(e.message, 'error'); }
        }

        async function render() {
            if (!status) return;
            document.getElementById('statusPanel').style.display = '';

            const bar = document.getElementById('pathwayBar');
            bar.className = status.pathway === 'urgent_consultant' ? 'pathway-bar pathway-urgent' : 'pathway-bar pathway-standard';
            bar.textContent = status.pathway === 'urgent_consultant' ? 'URGENT CONSULTANT PATHWAY' : 'STANDARD TRIAGE';

            document.getElementById('currentStepLabel').textContent = LABELS[status.current_step] || status.current_step;
            const badge = document.getElementById('statusBadge');
            badge.textContent = status.step_status;
            badge.className = `badge badge-${status.step_status.replace('_','-')}`;

            await Promise.all([loadPathwayDecisions(), loadConfirmations()]);
            renderSteps();
            renderMeta();

            const opts = await api('GET', `/${patientId}/next-options`).catch(() => null);
            renderDecisions(opts);
            const btn = document.getElementById('advanceBtn');
            btn.disabled = opts?.is_terminal || false;
            btn.style.display = (opts?.is_decision && !opts?.is_terminal) ? 'none' : '';
            btn.textContent = opts?.is_terminal ? 'Complete' : 'Advance';
        }

        function buildPath() {
            const s = ["GP_REFERRAL_RECEIVED","INTAKE_DIGITIZATION","DASHBOARD_CONFIRMATION","EXTRACT_RISK_FACTORS","RED_FLAG_ASSESSMENT"];
            if (status.metadata.red_flag_detected === true) {
                s.push("URGENT_CONSULTANT_PATHWAY");
            } else if (status.metadata.red_flag_detected === false) {
                s.push("PRESENT_TRIAGE_OPTIONS","GENERATE_GP_LETTER","ANALYZE_LFT_PATTERN","LFT_PATTERN_CLASSIFICATION");
                if (status.metadata.lft_pattern === 'cholestatic') s.push("CHOLESTATIC_PATTERN","CHOLESTATIC_INVESTIGATIONS");
                else s.push("HEPATITIC_PATTERN","HEPATITIC_INVESTIGATIONS");
                s.push("DIAGNOSTIC_DILEMMA_ASSESSMENT");
                if (status.metadata.diagnostic_dilemma === true)
                    s.push("RECOMMEND_MRI_BIOPSY_ESCALATE","CONSULTANT_MDT_REVIEW","CONSULTANT_REVIEW_SIGNOFF");
                else if (status.metadata.diagnostic_dilemma === false)
                    s.push("CONDUCT_CONSULTATION","CONFIRM_DIAGNOSIS_EDUCATION","PATIENT_EDUCATION");
            }
            s.push("ONGOING_MONITORING_ASSESSMENT");
            if (status.metadata.monitoring_required === true || status.final_disposition === "surveillance")
                s.push("AI_SURVEILLANCE_LOOP", "FINAL_CONSULTANT_SIGNOFF");
            if (status.metadata.monitoring_required === false || status.final_disposition === "discharged")
                s.push("DISCHARGE_TO_GP");
            return s;
        }

        let pathwayDecisions = {};

        function getOverrideOptions(step) {
            // Only branching steps can be overridden with a different decision
            const opts = {
                RED_FLAG_ASSESSMENT: ['yes', 'no'],
                LFT_PATTERN_CLASSIFICATION: ['cholestatic', 'hepatitic', 'mixed'],
                DIAGNOSTIC_DILEMMA_ASSESSMENT: ['yes', 'no'],
                ONGOING_MONITORING_ASSESSMENT: ['yes', 'no'],
            };
            return opts[step] || [];
        }

        async function loadPathwayDecisions() {
            if (!patientId) return;
            try {
                const res = await fetch(`${BASE}/${patientId}/pathway-decisions`);
                if (res.ok) {
                    const data = await res.json();
                    pathwayDecisions = {};
                    for (const d of (data.decisions || [])) {
                        pathwayDecisions[d.step] = d.reasoning;
                    }
                }
            } catch (e) {}
        }

        let confirmationLog = {};

        async function loadConfirmations() {
            if (!patientId) return;
            try {
                const res = await fetch(`${BASE}/${patientId}/confirmations`);
                if (res.ok) {
                    const data = await res.json();
                    confirmationLog = {};
                    for (const c of (data.confirmations || [])) {
                        confirmationLog[c.step] = c;
                    }
                }
            } catch (e) {}
        }

        function renderSteps() {
            const done = new Set(status.step_history.map(h => h.step));
            const steps = buildPath();
            document.getElementById('stepList').innerHTML = steps.map(s => {
                const active = s === status.current_step;
                const isDone = done.has(s);
                const isAwaiting = active && status.step_status === 'awaiting_confirmation';
                let cls = 'future', dot = 'future';
                if (isAwaiting) { cls = 'awaiting'; dot = 'awaiting'; }
                else if (active) { cls = 'active'; dot = 'active'; }
                else if (isDone) { cls = 'done'; dot = 'done'; }
                const hist = status.step_history.find(h => h.step === s);
                let meta = '';
                if (hist?.metadata) {
                    const parts = [];
                    if (hist.metadata.decision) parts.push(hist.metadata.decision);
                    if (hist.metadata.confidence) parts.push(`${(hist.metadata.confidence*100).toFixed(0)}%`);
                    if (parts.length) meta = parts.join(' | ');
                }
                // Confirmation status
                const conf = confirmationLog[s];
                let confTag = '';
                if (conf) {
                    if (conf.action === 'confirm') confTag = '<span class="confirmed-tag">CONFIRMED</span>';
                    else if (conf.action === 'override') confTag = `<span class="overridden-tag">OVERRIDDEN → ${conf.final_decision}</span>`;
                }
                const hasResult = (isDone || active) && RESULT_MAP[s];
                return `<div class="step ${cls}">
                    <div class="step-dot ${dot}">${isDone?'&#10003;':(isAwaiting?'!':'')}</div>
                    <div>
                        <div class="step-name">${LABELS[s]||s} ${confTag}</div>
                        ${meta?`<div class="step-meta">${meta}</div>`:''}
                    </div>
                    ${hasResult?`<span class="step-view" onclick="viewResult('${s}')">View</span>`:''}
                </div>`;
            }).join('');
        }

        function renderMeta() {
            const m = status.metadata;
            const has = m.red_flag_detected !== null || m.lft_pattern !== null || m.diagnostic_dilemma !== null;
            const area = document.getElementById('metaArea');
            if (!has) { area.style.display = 'none'; return; }
            area.style.display = '';
            const items = [];
            if (m.red_flag_detected !== null) items.push(`<span class="tag" style="background:${m.red_flag_detected?'#fee2e2;color:#991b1b':'#d1fae5;color:#065f46'}">Red Flag: ${m.red_flag_detected?'YES':'NO'}</span>`);
            if (m.lft_pattern) items.push(`<span class="tag" style="background:#dbeafe;color:#1e40af;">Pattern: ${m.lft_pattern.toUpperCase()}</span>`);
            if (m.diagnostic_dilemma !== null) items.push(`<span class="tag" style="background:${m.diagnostic_dilemma?'#fef3c7;color:#92400e':'#d1fae5;color:#065f46'}">Dilemma: ${m.diagnostic_dilemma?'YES':'NO'}</span>`);
            if (m.monitoring_required !== null) items.push(`<span class="tag">Monitoring: ${m.monitoring_required?'YES':'NO'}</span>`);
            document.getElementById('metaGrid').innerHTML = items.join('');
        }

        function renderDecisions(opts) {
            const area = document.getElementById('decisionArea');
            if (!opts || !opts.is_decision || opts.is_terminal) { area.style.display = 'none'; return; }
            area.style.display = '';
            area.innerHTML = `<div class="decision-box"><h3>${LABELS[status.current_step]}</h3>
                ${opts.options.map(o => `<button class="decision-btn" onclick="advance('${o.decision}')">${o.decision.toUpperCase()}<div style="font-size:0.65rem;color:#888;">${LABELS[o.next_step]||o.next_step}</div></button>`).join('')}</div>`;
        }

        document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        loadScenarios();
    </script>
</body>
</html>
